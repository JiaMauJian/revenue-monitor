name: 豁達人生持股財報追蹤

on:
  # 財報公告期（台灣時間下午4~9點每小時，UTC 8~13）
  # 年報 2/15~3/31、Q1 4/15~5/15、Q2 7/15~8/14、Q3 10/15~11/14
  schedule:
    # 年報 2/15~3/31（台灣時間下午4~9點，UTC 8~13）
    - cron: "0 8-13 15-28 2 *"   # 2月15~28日
    - cron: "0 8-13 * 3 *"       # 3月整月
    # Q1季報 4/15~5/15
    - cron: "0 8-13 15-30 4 *"   # 4月15~30日
    - cron: "0 8-13 1-15 5 *"    # 5月1~15日
    # Q2季報 7/15~8/14
    - cron: "0 8-13 15-31 7 *"   # 7月15~31日
    - cron: "0 8-13 1-14 8 *"    # 8月1~14日
    # Q3季報 10/15~11/14
    - cron: "0 8-13 15-31 10 *"  # 10月15~31日
    - cron: "0 8-13 1-14 11 *"   # 11月1~14日

  workflow_dispatch:

jobs:
  check-financial:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chinese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run financial checker
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python financial_checker.py

      - name: 儲存狀態與圖表到 repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_fin_state.json charts/
          git diff --staged --quiet || git commit -m "update fin state $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: 發送圖表到 LINE
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python send_charts.py
