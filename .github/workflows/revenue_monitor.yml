name: 台股月營收監控

on:
  schedule:
    - cron: '*/30 * 1-10 * *'

  workflow_dispatch:

jobs:
  check-revenue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: last_state.json
          key: revenue-state-${{ github.run_id }}
          restore-keys: |
            revenue-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run revenue checker
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python revenue_checker.py

      - name: Save state cache
        if: always()
        uses: actions/cache@v4
        with:
          path: last_state.json
          key: revenue-state-${{ github.run_id }}