name: 豁達人生持股月營收追蹤

on:
  schedule:
    # 每月1~10號，台灣時間下午4~9點每小時（UTC 8~13）
    - cron: '0 8-13 1-10 * *'
  workflow_dispatch:

concurrency:
  group: revenue-monitor
  cancel-in-progress: false

jobs:
  check-revenue:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chinese font
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run revenue checker
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python revenue_checker.py

      - name: 儲存狀態與圖表到 repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_state.json charts/
          git diff --staged --quiet || git commit -m "update state $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: 發送圖表到 LINE
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python send_charts.py
