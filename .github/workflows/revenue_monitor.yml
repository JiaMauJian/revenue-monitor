name: 豁達人生持股月營收追蹤

on:
  schedule:
    - cron: '*/30 * 1-10 * *'
  workflow_dispatch:

jobs:
  check-revenue:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run revenue checker
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python revenue_checker.py

      - name: 儲存狀態到 repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_state.json
          git diff --staged --quiet || git commit -m "update state $(date +'%Y-%m-%d %H:%M')"
          git push
